# =============================================================================
# CI/CD Pipeline for SSL Pretraining Framework
# =============================================================================
# Triggers: push/PR to main/master, manual dispatch
# Jobs:
#   1. lint        — Code quality checks (ruff)
#   2. validate    — Import validation & config sanity check
#   3. docker      — Build and push Docker image (main branch only)
# =============================================================================

name: CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Lint
  # ---------------------------------------------------------------------------
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install linter
        run: pip install ruff

      - name: Run ruff
        run: ruff check .

  # ---------------------------------------------------------------------------
  # Job 2: Validate imports and configuration
  # ---------------------------------------------------------------------------
  validate:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate imports
        run: python -c "import lightly_train; from ultralytics import settings; print('Imports OK')"

  # ---------------------------------------------------------------------------
  # Job 3: Build & push Docker image (only on main branch push)
  # ---------------------------------------------------------------------------
  docker:
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          target: train
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
